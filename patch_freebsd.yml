---
- name: Patch FreeBSD pkgbase servers
  hosts: freebsd
  become: true
  serial: 1

  tasks:
    - name: Update pkg repository metadata
      command: pkg update
      changed_when: false

    - name: Upgrade all packages (including base OS)
      command: pkg upgrade -y
      register: pkg_upgrade

    - name: Show upgraded packages
      debug:
        var: pkg_upgrade.stdout_lines

    - name: Check FreeBSD version after patching
      command: freebsd-version -k
      register: kernel_version
      changed_when: false

    - name: Notify reboot may be required
      debug:
        msg: "Reboot required if FreeBSD-kernel or libc packages were upgraded"
